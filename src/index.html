<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaudePulse</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Setup banner -->
    <div id="setup-banner" class="setup-banner hidden">
      <p>Configure Claude Code hooks?</p>
      <div class="setup-actions">
        <button id="btn-setup" class="btn-primary">Configure</button>
        <button id="btn-skip" class="btn-secondary">Skip</button>
      </div>
    </div>

    <!-- Capsule -->
    <div id="capsule" class="capsule">
      <div class="capsule-icon">
        <!-- Claude AI official icon (from Wikimedia) -->
        <svg class="spark-icon" viewBox="0 0 1200 1200" fill="currentColor">
          <path d="M233.96 800.21L468.64 668.54l3.95-11.44-3.95-6.36-11.44 0-39.22-2.42-134.09-3.62-116.3-4.83-112.67-6.04-28.35-6.04L0 592.75l2.74-17.48 23.84-16.03 34.15 2.98 75.46 5.15 113.23 7.81 82.15 4.83 121.69 12.65 19.33 0 2.74-7.81-6.6-4.83-5.15-4.83L346.39 495.79 219.54 411.87l-66.44-48.32-35.92-24.48-18.12-22.95-7.81-50.09 32.62-35.92 43.81 2.98 11.19 2.98 44.38 34.15 94.79 73.37 123.79 91.17 18.12 15.06 7.25-5.15.89-3.63-8.13-13.61-67.46-121.69-71.84-123.79-31.97-51.3-8.46-30.76c-2.98-12.64-5.15-23.27-5.15-36.24l37.13-50.42 20.54-6.6 49.53 6.6 20.86 18.12 30.76 70.39 49.85 110.82 77.32 150.68 22.63 44.7 12.08 41.4 4.51 12.64h7.81v-7.25l6.36-84.89 11.76-104.21 11.44-134.09 3.94-37.77 18.68-45.26 37.13-24.48 28.99 13.85 23.84 34.15-3.3 22.07-14.17 92.13-27.79 144.32-18.12 96.64 10.55 0 12.08-12.08 48.89-64.91 82.15-102.68 36.24-40.76 42.28-45.02 27.14-21.42 51.3 0 37.77 56.13-16.91 57.99-52.83 67.01-43.81 56.78-62.82 84.56-39.22 67.65 3.63 5.4 9.34-.89 141.91-30.2 76.67-13.85 91.49-15.7 41.4 19.33 4.51 19.65-16.27 40.19-97.85 24.16-114.77 22.95-170.9 40.43-2.09 1.53 2.42 2.98 76.99 7.25 32.94 1.77 80.62 0 150.12 11.19 39.22 25.93 23.52 31.73-3.95 24.16-60.4 30.76-81.5-19.33-190.23-45.26-65.46-16.27-9.02 0v5.4l54.36 53.15 99.62 89.96 124.75 115.97 6.36 28.67-16.03 22.63-16.91-2.42-109.61-82.47-42.28-37.13-95.76-80.62-6.36 0v8.46l22.07 32.29 116.54 175.17 6.04 53.72-8.46 17.48-30.2 10.55-33.18-6.04-68.21-95.76-70.39-107.84-56.78-96.64-6.93 3.95-33.5 360.89-15.7 18.44-36.24 13.85-30.2-22.95-16.03-37.13 16.03-73.37 19.33-95.76 15.7-76.11 14.17-94.55 8.46-31.41-.56-2.09-6.93.89-71.28 97.85-108.4 146.5-85.77 91.81-20.54 8.13-35.6-18.44 3.3-32.94 19.89-29.31 118.74-151.01 71.6-93.58 46.23-53.72-.32-7.81-2.74 0L205.29 929.4l-56.13 7.25-24.16-22.63 2.98-37.13 11.44-12.08 94.79-65.23z"/>
        </svg>
      </div>
      <span id="capsule-project" class="capsule-project">Pulse</span>
      <span id="capsule-status" class="capsule-status"></span>
      <span class="capsule-spacer"></span>
      <span id="capsule-time" class="capsule-time"></span>
      <span id="capsule-count" class="capsule-count hidden"></span>
    </div>

    <!-- Expanded view -->
    <div id="view-expanded" class="hidden">
      <div id="session-list" class="session-list"></div>
      <div class="action-bar">
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <button id="btn-pin" class="icon-btn" title="Keep Expanded">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5v6h2v-6h5v-2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Settings view -->
    <div id="view-settings" class="hidden">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button id="btn-close-settings" class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <div><div class="setting-main-label">Keep Expanded</div><div class="setting-sub-label">Panel stays open without hovering</div></div>
          <label class="toggle"><input type="checkbox" id="toggle-pin" /><span class="toggle-slider"></span></label>
        </div>
        <div class="setting-group">
          <div><div class="setting-main-label">Sound on Complete</div><div class="setting-sub-label">Play a sound when work finishes</div></div>
          <label class="toggle"><input type="checkbox" id="toggle-sound" /><span class="toggle-slider"></span></label>
        </div>
        <div id="sound-picker" class="setting-group hidden">
          <span class="setting-label">Sound</span>
          <div id="sound-dropdown" class="custom-dropdown">
            <div class="dropdown-selected">Glass</div>
            <div class="dropdown-options hidden">
              <div class="dropdown-option active" data-value="glass">Glass</div>
              <div class="dropdown-option" data-value="ping">Ping</div>
              <div class="dropdown-option" data-value="pop">Pop</div>
              <div class="dropdown-option" data-value="chime">Chime</div>
              <div class="dropdown-option" data-value="bell">Bell</div>
            </div>
          </div>
        </div>
        <div class="setting-group-col">
          <label class="setting-label">Accent Color</label>
          <div class="color-picker">
            <button class="color-dot active" data-color="purple" style="background:rgb(217,128,255)"></button>
            <button class="color-dot" data-color="cyan" style="background:rgb(77,217,255)"></button>
            <button class="color-dot" data-color="green" style="background:rgb(77,242,153)"></button>
            <button class="color-dot" data-color="orange" style="background:rgb(255,153,51)"></button>
            <button class="color-dot" data-color="pink" style="background:rgb(255,102,153)"></button>
          </div>
        </div>
        <div class="setting-group-col">
          <label class="setting-label">Size</label>
          <div class="size-picker">
            <button class="size-btn" data-size="small">S</button>
            <button class="size-btn active" data-size="medium">M</button>
            <button class="size-btn" data-size="large">L</button>
          </div>
        </div>
        <div class="setting-divider"></div>
        <button id="btn-quit" class="btn-quit">Quit Pulse</button>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
