name: Build

# Cross-platform build check. Catches compile errors on all three OSes
# without needing Mac/Windows machines locally.
#
# Runs on:
#   - push to main
#   - pull requests to main
#   - manual dispatch (Actions tab → Run workflow)
#
# Produces build artifacts (binary only, no installer bundles) for download.
# For a full release with installers, see release.yml (tag-triggered).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
          - platform: macos-latest
            name: macos
          - platform: windows-latest
            name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build (no bundle)
        run: cargo tauri build --no-bundle

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-pulse-${{ matrix.name }}
          path: |
            src-tauri/target/release/agent-pulse
            src-tauri/target/release/agent-pulse.exe
          if-no-files-found: ignore
          retention-days: 7
